services:
  cap:
    image: tiago2/cap:latest
    container_name: cap
    ports:
      - "3500:3000"
    environment:
      ADMIN_KEY: ${ADMIN_KEY:?set ADMIN_KEY in Dokploy secrets}
      REDIS_URL: redis://valkey:6379
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cap.entrypoints=websecure"
      - "traefik.http.routers.cap.rule=Host(`cap.itartur.ru`) && !PathPrefix(`/.well-known/acme-challenge/`)"
      - "traefik.http.routers.cap.tls=true"
      - "traefik.http.routers.cap.tls.certresolver=letsencrypt"
      - "traefik.http.services.cap.loadbalancer.server.port=3000"

  valkey:
    image: valkey/valkey:9-alpine
    container_name: cap-valkey
    volumes:
      - valkey-data:/data
    command: valkey-server --save 60 1 --loglevel warning --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  valkey-data:
