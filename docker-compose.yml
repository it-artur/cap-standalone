services:
  cap:
    image: tiago2/cap:latest
    network_mode: host
    environment:
      ADMIN_KEY: ${ADMIN_KEY:?set ADMIN_KEY in .env or Dokploy secrets}
      REDIS_URL: redis://127.0.0.1:6379
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9-alpine
    network_mode: host
    volumes:
      - valkey-data:/data
    command: valkey-server --port 6379 --save 60 1 --loglevel warning --maxmemory-policy noeviction --bind 127.0.0.1
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  valkey-data:
